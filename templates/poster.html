<!doctype html>
<html>
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
        width: 480px;
        height: 800px;
        background: black;
        overflow: hidden;
        position: relative;
      }

      .poster {
        width: 100%;
        height: 100%;
        object-fit: cover;
        filter: contrast(1.2) saturate(1.4);
      }
      .overlay {
        position: absolute;
        bottom: 0;
        width: 100%;
        background: linear-gradient(transparent, black 80%);
        padding: 60px 20px 20px 20px;
        box-sizing: border-box;
        color: white;
        text-align: center;
        font-family: "Oswald", sans-serif;
      }

      .rating {
        font-size: 54px;
        margin-bottom: 5px;
        text-shadow: 2px 2px 6px black;
        color: #f5c518; /* IMDb Yellow */
      }
    </style>
  </head>
  <body>
    <img class="poster" src="{poster_url}" />
    <div class="overlay">
      <div class="rating">⭐ {movie_rating}</div>
    </div>
  </body>
</html>
