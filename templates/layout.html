<!doctype html>
<html>
  <head>
    <link
      href="https://fonts.googleapis.com/css2?family=Merriweather:wght@700&family=Oswald:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        font-family: "Merriweather", "Georgia", serif;
        margin: 0;
        padding: 0;
        width: 480px;
        height: 800px;
        background: white;
        display: flex;
        justify-content: center;
        overflow: hidden;
      }
      .newspaper-wrapper {
        width: 450px;
        padding-top: 15px;
        height: 785px;
        display: flex;
        flex-direction: column;
      }
      .middle-section {
        display: flex;
        flex-grow: 1;
        gap: 15px;
        overflow: hidden;
        margin-bottom: 8px;
      }
      .col-left {
        flex: 1.8;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .col-right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .vertical-line {
        width: 2px;
        background-color: black;
        flex-shrink: 0;
      }

      .news-block {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
        overflow: hidden;
      }
      .anchor-bottom {
        margin-top: auto;
        border-top: 2px solid black;
        padding-top: 8px;
        flex-shrink: 0;
      }

      .limit-text-long {
        max-height: 400px;
        overflow: hidden;
      }

      .limit-text-short {
        max-height: 250px;
        overflow: hidden;
      }

      .area-header {
        text-align: center;
        border-top: 4px solid black;
        border-bottom: 5px double black;
        padding: 10px 0;
        margin-bottom: 12px;
        flex-shrink: 0;
      }
      .area-joke {
        text-align: center;
        padding: 8px 0;
        font-size: 11px;
        font-style: italic;
        flex-shrink: 0;
        border-top: 1px solid black;
      }
      .area-comic {
        border-top: 5px double black;
        padding-top: 8px;
        height: 135px;
        display: flex;
        justify-content: center;
        overflow: hidden;
        flex-shrink: 0;
      }

      .title {
        font-family: "Oswald", sans-serif;
        font-size: 44px;
        text-transform: uppercase;
        font-weight: 700;
        line-height: 1;
        margin-bottom: 6px;
      }
      .meta {
        font-family: "Oswald", sans-serif;
        font-size: 11px;
        display: flex;
        justify-content: space-between;
        border-top: 1px solid black;
        padding-top: 4px;
      }
      h2 {
        font-family: "Oswald", sans-serif;
        font-size: 14px;
        border-bottom: 2px solid black;
        text-transform: uppercase;
        text-align: center;
        margin: 0 0 8px 0;
        padding-bottom: 4px;
      }
      .news-content {
        font-weight: 700;
        font-size: 11px;
        line-height: 1.4;
      }
      .comic-img {
        max-width: 100%;
        height: 130px;
        object-fit: contain;
        filter: grayscale(100%) contrast(1.2);
      }
    </style>
  </head>
  <body>
    <div class="newspaper-wrapper">
      <div class="area-header">
        <div class="title">The Daily Ink</div>
        <div class="meta">
          <span>BTC: {crypto_btc} | ETH: {crypto_eth}</span>
          <span>{date}</span>
          <span>{weather}</span>
        </div>
      </div>

      <div class="middle-section">
        <div class="col-left">
          {wiki_block}
          <div class="anchor-bottom">{facts_block}</div>
        </div>

        <div class="vertical-line"></div>

        <div class="col-right">
          {recipe_block}
          <div class="anchor-bottom">{history_block}</div>
        </div>
      </div>

      <div class="area-joke">{word_block}</div>
      <div class="area-comic"><img class="comic-img" src="{comic_url}" /></div>
    </div>
  </body>
</html>
